<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="400" cy="400" r="360"/>
    </clipPath>
  </defs>
  <rect width="100%" height="100%" fill="#e0f2fe"/>
  <g clip-path="url(#circle)">
    <rect x="-50" y="-50" width="900" height="900" fill="url(#g)"/>
    <image href="/profile.png" x="0" y="0" width="800" height="800" preserveAspectRatio="xMidYMid slice" />
    <g opacity="0.14">
      <circle cx="150" cy="200" r="140" fill="#fff"/>
      <circle cx="650" cy="620" r="180" fill="#fff"/>
    </g>
  </g>
</svg>
